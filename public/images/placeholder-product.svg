<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#eef4ff"/>
      <stop offset="100%" stop-color="#e0ecff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="280" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5f9ff"/>
      <stop offset="100%" stop-color="#e8f0fd"/>
    </linearGradient>
    <linearGradient id="icon" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#3180d0"/>
      <stop offset="100%" stop-color="#004aad"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="10" cy="10" r="1" fill="#c6d8f7" opacity="0.5"/>
  </pattern>
  <rect width="400" height="400" fill="url(#dots)"/>

  <!-- Card -->
  <rect x="55" y="55" width="290" height="290" rx="28" fill="url(#card)" stroke="#c6d8f7" stroke-width="1.5"/>

  <!-- Image icon frame -->
  <rect x="130" y="130" width="140" height="105" rx="14" fill="#d6e6fb" stroke="#a8c4ef" stroke-width="1.5"/>

  <!-- Sun / circle in corner -->
  <circle cx="158" cy="158" r="14" fill="#f0f6ff" stroke="#a8c4ef" stroke-width="1.5"/>
  <circle cx="158" cy="158" r="7" fill="#3180d0" opacity="0.6"/>

  <!-- Mountain / landscape shape -->
  <path d="M134 222 L163 183 L185 204 L207 175 L266 222 Z" fill="#a8c4ef" opacity="0.7"/>
  <path d="M185 204 L207 175 L235 210" fill="#8ab4e8" opacity="0.5"/>

  <!-- SEZY pill -->
  <rect x="150" y="260" width="100" height="26" rx="13" fill="#004aad" opacity="0.14"/>
  <text x="200" y="278" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#004aad" font-weight="700" letter-spacing="3" opacity="0.8">SEZY</text>

  <!-- Corner accent dots -->
  <circle cx="84" cy="84" r="5" fill="#3180d0" opacity="0.15"/>
  <circle cx="316" cy="316" r="5" fill="#004aad" opacity="0.15"/>
  <circle cx="316" cy="84" r="3" fill="#3180d0" opacity="0.1"/>
  <circle cx="84" cy="316" r="3" fill="#004aad" opacity="0.1"/>
</svg>
