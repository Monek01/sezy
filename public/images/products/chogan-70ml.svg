<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0f4ff"/>
      <stop offset="100%" stop-color="#e3eaff"/>
    </linearGradient>
    <linearGradient id="bottle" x1="145" y1="70" x2="255" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e8eeff"/>
      <stop offset="40%" stop-color="#c5d0f0"/>
      <stop offset="100%" stop-color="#1a237e"/>
    </linearGradient>
    <linearGradient id="cap" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#d4af00"/>
      <stop offset="100%" stop-color="#a08000"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- Sparkles -->
  <path d="M75 130 L78 140 L88 143 L78 146 L75 156 L72 146 L62 143 L72 140Z" fill="#1a237e" opacity="0.12"/>
  <path d="M325 180 L327 187 L334 189 L327 191 L325 198 L323 191 L316 189 L323 187Z" fill="#1a237e" opacity="0.1"/>
  <path d="M310 80 L312 86 L318 88 L312 90 L310 96 L308 90 L302 88 L308 86Z" fill="#d4af00" opacity="0.2"/>
  <!-- Wider/taller bottle for 70ml -->
  <rect x="152" y="125" width="96" height="215" rx="18" fill="url(#bottle)" stroke="#9fa8da" stroke-width="1.5"/>
  <!-- Shoulder -->
  <path d="M152 165 Q152 125 168 118 L232 118 Q248 125 248 165Z" fill="#1a237e"/>
  <!-- Gold cap - wider -->
  <rect x="162" y="72" width="76" height="52" rx="10" fill="url(#cap)"/>
  <rect x="169" y="79" width="62" height="38" rx="8" fill="#d4af00"/>
  <!-- Cap shine -->
  <rect x="173" y="84" width="5" height="28" rx="2.5" fill="white" opacity="0.2"/>
  <!-- Label area -->
  <rect x="162" y="170" width="76" height="120" rx="10" fill="white" opacity="0.12"/>
  <!-- Brand name -->
  <text x="200" y="200" text-anchor="middle" font-family="Georgia,serif" font-size="13" fill="white" font-weight="700" font-style="italic">Chogan</text>
  <line x1="167" y1="208" x2="233" y2="208" stroke="white" stroke-width="0.8" opacity="0.5"/>
  <!-- Gold accent line -->
  <line x1="167" y1="210" x2="233" y2="210" stroke="#d4af00" stroke-width="1.5" opacity="0.6"/>
  <text x="200" y="226" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="white" opacity="0.85" letter-spacing="2">PARFUM</text>
  <!-- Crown/floral icon -->
  <path d="M192 250 Q196 242 200 250 Q204 242 208 250 L210 258 Q200 265 190 258Z" fill="white" opacity="0.2"/>
  <circle cx="200" cy="248" r="3" fill="#d4af00" opacity="0.7"/>
  <text x="200" y="277" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="white" opacity="0.7">70 ml · EDP</text>
  <!-- Shine -->
  <rect x="235" y="138" width="6" height="90" rx="3" fill="white" opacity="0.18"/>
  <!-- Brand -->
  <rect x="148" y="352" width="104" height="22" rx="11" fill="#1a237e" opacity="0.1"/>
  <text x="200" y="368" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#1a237e" font-weight="700" letter-spacing="2">SEZY</text>
</svg>
