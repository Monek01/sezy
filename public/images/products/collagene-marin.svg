<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e0f7fa"/>
      <stop offset="100%" stop-color="#b2ebf2"/>
    </linearGradient>
    <linearGradient id="bottle" x1="140" y1="60" x2="260" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0f7fa"/>
    </linearGradient>
    <linearGradient id="cap" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#006064"/>
      <stop offset="100%" stop-color="#00838f"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- Ocean waves bg -->
  <ellipse cx="200" cy="380" rx="220" ry="60" fill="#80deea" opacity="0.3"/>
  <ellipse cx="200" cy="395" rx="200" ry="50" fill="#4dd0e1" opacity="0.2"/>
  <!-- Bubbles -->
  <circle cx="80" cy="120" r="12" fill="white" opacity="0.4"/>
  <circle cx="320" cy="180" r="8" fill="white" opacity="0.3"/>
  <circle cx="60" cy="260" r="6" fill="white" opacity="0.35"/>
  <circle cx="340" cy="300" r="10" fill="white" opacity="0.3"/>
  <circle cx="100" cy="330" r="5" fill="white" opacity="0.4"/>
  <!-- Bottle body -->
  <rect x="148" y="105" width="104" height="210" rx="22" fill="url(#bottle)" stroke="#80deea" stroke-width="2"/>
  <!-- Cap -->
  <rect x="158" y="68" width="84" height="45" rx="12" fill="url(#cap)"/>
  <!-- Label area -->
  <rect x="160" y="150" width="80" height="115" rx="10" fill="#006064" opacity="0.9"/>
  <!-- Label text -->
  <text x="200" y="185" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="white" font-weight="700" letter-spacing="1">COLLAGÈNE</text>
  <text x="200" y="199" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="white" font-weight="700" letter-spacing="1">MARIN</text>
  <!-- Fish silhouette -->
  <path d="M175 220 Q185 213 200 218 Q215 213 225 220 Q215 227 200 222 Q185 227 175 220Z" fill="white" opacity="0.6"/>
  <circle cx="220" cy="219" r="2" fill="#006064"/>
  <!-- Drops -->
  <path d="M183 240 Q183 233 187 233 Q191 233 191 240 Q191 246 187 248 Q183 246 183 240Z" fill="#80deea" opacity="0.8"/>
  <path d="M196 244 Q196 237 200 237 Q204 237 204 244 Q204 250 200 252 Q196 250 196 244Z" fill="#80deea" opacity="0.8"/>
  <path d="M209 240 Q209 233 213 233 Q217 233 217 240 Q217 246 213 248 Q209 246 209 240Z" fill="#80deea" opacity="0.8"/>
  <!-- Shine -->
  <rect x="230" y="118" width="8" height="60" rx="4" fill="white" opacity="0.35"/>
  <!-- Brand -->
  <rect x="150" y="340" width="100" height="22" rx="11" fill="#006064" opacity="0.15"/>
  <text x="200" y="356" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#006064" font-weight="700" letter-spacing="2">SEZY</text>
</svg>
