<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="100%" stop-color="#eceff1"/>
    </linearGradient>
    <linearGradient id="jar" x1="130" y1="100" x2="270" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eceff1"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- Hexagon crystal shapes bg -->
  <polygon points="320,60 340,74 340,102 320,116 300,102 300,74" fill="#78909c" opacity="0.1"/>
  <polygon points="75,200 90,209 90,227 75,236 60,227 60,209" fill="#78909c" opacity="0.1"/>
  <polygon points="340,270 352,278 352,292 340,300 328,292 328,278" fill="#78909c" opacity="0.08"/>
  <!-- Jar body -->
  <rect x="140" y="145" width="120" height="170" rx="16" fill="url(#jar)" stroke="#cfd8dc" stroke-width="2"/>
  <!-- Jar lid -->
  <rect x="136" y="100" width="128" height="52" rx="14" fill="#546e7a"/>
  <rect x="148" y="110" width="104" height="32" rx="10" fill="#607d8b"/>
  <!-- Lid shine -->
  <rect x="155" y="114" width="6" height="22" rx="3" fill="white" opacity="0.2"/>
  <!-- Label on jar -->
  <rect x="152" y="165" width="96" height="130" rx="10" fill="#455a64" opacity="0.92"/>
  <!-- Zn symbol -->
  <circle cx="200" cy="208" r="24" fill="white" opacity="0.12"/>
  <text x="200" y="217" text-anchor="middle" font-family="system-ui,sans-serif" font-size="26" fill="white" font-weight="900">Zn</text>
  <!-- Label text -->
  <line x1="162" y1="235" x2="238" y2="235" stroke="white" stroke-width="0.8" opacity="0.4"/>
  <text x="200" y="252" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="white" font-weight="700" letter-spacing="1.5">ZINC</text>
  <text x="200" y="266" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7.5" fill="white" opacity="0.75">Complément alimentaire</text>
  <text x="200" y="279" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7.5" fill="white" opacity="0.75">25 mg · 60 gélules</text>
  <!-- Shine on jar -->
  <rect x="250" y="160" width="6" height="50" rx="3" fill="white" opacity="0.3"/>
  <!-- Brand -->
  <rect x="150" y="335" width="100" height="22" rx="11" fill="#455a64" opacity="0.12"/>
  <text x="200" y="351" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#455a64" font-weight="700" letter-spacing="2">SEZY</text>
</svg>
